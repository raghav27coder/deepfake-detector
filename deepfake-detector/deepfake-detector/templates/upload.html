<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Video — DeepFake Detector</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="upload-page">

  <!-- NAV -->
  <nav class="navbar">
    <div class="nav-brand">
      <a href="/" style="text-decoration:none; display:flex; align-items:center; gap:0.5rem;">
        <span class="brand-icon">⬡</span>
        <span class="brand-name">DeepFake<span class="accent">Detector</span></span>
      </a>
    </div>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/upload" class="active">Analyze</a></li>
    </ul>
  </nav>

  <main class="upload-main">
    <div class="upload-container">
      <h1 class="upload-title">Upload Your Video</h1>
      <p class="upload-subtitle">Supported formats: <strong>.mp4 · .avi · .mov</strong> &nbsp;·&nbsp; Max size: 200 MB</p>

      <!-- DROP ZONE -->
      <div class="drop-zone" id="dropZone">
        <div class="drop-zone-inner">
          <div class="drop-icon">
            <svg viewBox="0 0 64 64" width="64" height="64">
              <rect x="8" y="16" width="48" height="36" rx="4" fill="none" stroke="var(--accent)" stroke-width="2.5"/>
              <polygon points="26,26 26,42 42,34" fill="var(--accent)" opacity="0.7"/>
              <path d="M32 4 L32 14 M28 8 L32 4 L36 8" stroke="var(--accent)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            </svg>
          </div>
          <p class="drop-text">Drag &amp; drop your video here</p>
          <p class="drop-or">— or —</p>
          <label for="fileInput" class="btn-secondary">Browse File</label>
          <input type="file" id="fileInput" accept=".mp4,.avi,.mov" hidden />
        </div>
      </div>

      <!-- FILE PREVIEW INFO -->
      <div class="file-info" id="fileInfo" style="display:none;">
        <div class="file-info-inner">
          <span class="file-icon">🎬</span>
          <div>
            <p class="file-name" id="fileName"></p>
            <p class="file-size" id="fileSize"></p>
          </div>
          <button class="remove-btn" id="removeFile" title="Remove">✕</button>
        </div>
      </div>

      <!-- UPLOAD BUTTON -->
      <button class="btn-primary btn-upload" id="uploadBtn" disabled>
        <span id="uploadBtnText">Select a video first</span>
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
      </button>

      <!-- ERROR MESSAGE -->
      <p class="upload-error" id="uploadError"></p>
    </div>
  </main>

  <!-- LOADING OVERLAY -->
  <div class="loading-overlay" id="loadingOverlay" style="display:none;">
    <div class="loading-card">
      <div class="dna-loader">
        <div class="dna-dot"></div>
        <div class="dna-dot"></div>
        <div class="dna-dot"></div>
        <div class="dna-dot"></div>
        <div class="dna-dot"></div>
      </div>
      <h2 class="loading-title">Analyzing Video</h2>
      <p class="loading-step" id="loadingStep">Uploading video...</p>
      <div class="loading-bar-outer">
        <div class="loading-bar-inner" id="loadingBar"></div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>DeepFake Detector &mdash; Mini Project &mdash; Built with Flask + TensorFlow</p>
  </footer>

  <script src="/static/js/script.js"></script>
</body>
</html>
